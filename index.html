<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="day-theme">

    <header class="header">
        <div class="logo">Лабораторна №4</div>
        <button id="themeToggle" class="theme-btn">Змінити тему</button>
    </header>

    <main class="container">
        <section id="comments-section" class="comments-section">
            <h2 class="section-title">Відгуки попередніх роботодавців</h2>
            <div id="comments" class="comments-list"></div>
        </section>

        <div id="modal" class="modal-overlay">
            <div class="modal-content glass">
                <h3>Зворотній зв'язок</h3>
                <form action="https://formspree.io/f/xjgpjvwo" method="POST">
                    <input type="text" name="name" placeholder="Ваше ім'я" required>
                    <input type="email" name="email" placeholder="Ваш email" required>
                    <input type="tel" name="phone" placeholder="Ваш телефон" required>
                    <textarea name="message" placeholder="Ваше повідомлення" required></textarea>
                    <button type="submit" class="submit-btn">Відправити</button>
                </form>
                <button id="closeModal" class="close-btn">Закрити</button>
            </div>
        </div>
    </main>

    <footer id="footer" class="footer"></footer>

    <script src="script.js"></script>
</body>
</html>
